<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" class="page">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow Login</title>
    <link rel="stylesheet" href="loginpg.css">
</head>
<body>

   
        <div class="form-panel">
            <div class="auth-box">
                <h2>Welcome back</h2>
                <p class="sub-text">Login to your account</p>

                <form id="loginForm">
                    <div class="input-group">
                        <input type="text" id="loginId" placeholder="Email / Username" required>
                    </div>

                    <div class="input-group">
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <span onclick="togglePassword()" class="toggle-eye" id="toggleEye">show</span>
                    </div>

                    <div class="form-footer">
                        <label>
                            <input type="checkbox" id="rememberMe">
                            Remember me
                        </label>
                        <a href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="submit-btn">Login</button>
                </form>

                <p class="signup-text">Don't have an account? <a href="#">Sign up</a></p>
            </div>
        </div>

    </div>

    <script src="loginpg.js"></script>
</body>
</html>
